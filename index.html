<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>罗鸣道减肥记录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#10b981;
  --primary-dark:#059669;
  --primary-light:#d1fae5;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#1e293b;
  --text-secondary:#64748b;
  --border:#e2e8f0;
  --shadow:0 1px 3px rgba(0,0,0,0.05),0 4px 12px rgba(0,0,0,0.08);
  --radius:20px;
  --radius-sm:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;line-height:1.6}

/* Header */
.header{background:linear-gradient(145deg,var(--primary),var(--primary-dark));color:#fff;padding:20px;position:relative}
.header h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:10px}
.header .date-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
.header .date-nav button{width:36px;height:36px;border:none;background:rgba(255,255,255,0.15);color:#fff;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.header .date-nav button:hover{background:rgba(255,255,255,0.25)}
.date-picker{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:var(--radius-sm);font-size:14px;text-align:center;cursor:pointer;min-width:130px}
.date-picker::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}

/* Tab Content */
.tab-content{display:none;padding:16px;animation:fadeIn 0.3s ease-out}
.tab-content.active{display:block}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Home Tab - Weight Display */
.weight-card{text-align:center;padding:30px 20px;background:linear-gradient(145deg,var(--primary),var(--primary-dark));color:#fff;border-radius:var(--radius);margin-bottom:16px}
.weight-value{font-size:72px;font-weight:700;line-height:1}
.weight-unit{font-size:20px;opacity:0.9;margin-left:4px}
.weight-change{margin-top:12px;font-size:14px;opacity:0.95}
.weight-change .arrow{font-size:18px;margin-right:4px}

.input-wrap{background:#fff;border-radius:var(--radius-sm);padding:4px;display:flex;gap:8px;margin-top:20px}
.input-wrap input{flex:1;border:none;background:transparent;padding:14px;font-size:18px;outline:none;color:var(--text)}
.input-wrap input::placeholder{color:#94a3b8}
.btn-white{background:#fff;color:var(--primary);border:none;padding:14px 28px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-white:active{transform:scale(0.98)}

.quick-actions{display:flex;gap:10px;margin-top:16px}
.quick-actions button{flex:1;padding:12px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);border-radius:10px;font-size:14px;color:#fff;cursor:pointer}
.quick-actions button:active{background:rgba(255,255,255,0.2)}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-item{background:var(--card);border-radius:var(--radius-sm);padding:20px;text-align:center;border:1px solid var(--border)}
.stat-value{font-size:28px;font-weight:700;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px}

/* Chart */
.chart-container{position:relative;height:240px;margin-top:8px}

/* Track Cards */
.track-card{display:flex;align-items:center;gap:16px;padding:20px;background:var(--card);border-radius:var(--radius);margin-bottom:12px;border:1px solid var(--border)}
.track-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--primary-light)}
.track-info{flex:1}
.track-title{font-size:16px;font-weight:600;color:var(--text)}
.track-value{font-size:32px;font-weight:700;color:var(--primary);margin-top:4px}
.track-unit{font-size:14px;color:var(--text-secondary);margin-left:4px}
.track-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(16,185,129,0.3)}
.track-btn:active{transform:scale(0.95)}

.track-input{flex:1;display:flex;gap:8px}
.track-input input{flex:1;padding:14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;outline:none}
.track-input input:focus{border-color:var(--primary)}
.track-input button{padding:14px 20px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}

/* History */
.history-list{max-height:calc(100vh - 280px);overflow-y:auto}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:10px;border:1px solid var(--border)}
.history-date{display:flex;flex-direction:column}
.history-date .day{font-size:15px;font-weight:600;color:var(--text)}
.history-date .weekday{font-size:12px;color:var(--text-secondary);margin-top:2px}
.history-right{text-align:right}
.history-weight{font-size:20px;font-weight:700;color:var(--primary)}
.history-diff{font-size:12px;margin-top:4px;padding:4px 10px;border-radius:12px;display:inline-block}
.history-diff.down{background:var(--primary-light);color:var(--primary-dark)}
.history-diff.up{background:#fef2f2;color:#dc2626}

/* Settings */
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:12px;border:1px solid var(--border);cursor:pointer}
.setting-item:active{background:#f8fafc}
.setting-left{display:flex;align-items:center;gap:14px}
.setting-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:#f1f5f9}
.setting-title{font-size:15px;font-weight:500;color:var(--text)}
.setting-arrow{color:var(--text-secondary);font-size:18px}

.tips-card{background:linear-gradient(135deg,var(--primary-light),#ecfdf5);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid #bbf7d0}
.tips-title{font-size:15px;font-weight:600;color:var(--primary-dark);margin-bottom:8px}
.tips-text{font-size:14px;color:#166534;line-height:1.7}

.quote{text-align:center;padding:20px;color:var(--text-secondary);font-size:14px;font-style:italic}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);transition:all 0.2s}
.nav-item.active{color:var(--primary)}
.nav-item .icon{font-size:22px}
.nav-item .label{font-size:11px;font-weight:500}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <h1>⚖️ 罗鸣道减肥记录</h1>
  <div class="date-nav">
    <button onclick="prevDay()">◀</button>
    <input type="date" class="date-picker" id="selectedDate" onchange="changeDate(this.value)">
    <button onclick="nextDay()">▶</button>
  </div>
</div>

<!-- Tab 1: Home -->
<div class="tab-content active" id="tab-home">
  <div class="weight-card">
    <div>
      <span class="weight-value" id="homeWeight">--</span><span class="weight-unit">kg</span>
    </div>
    <div class="weight-change" id="homeChange">今日未记录</div>
    <div class="input-wrap">
      <input type="number" id="homeWeightInput" step="0.1" min="30" max="200" placeholder="输入体重">
      <button class="btn-white" onclick="saveHomeWeight()">记录</button>
    </div>
    <div class="quick-actions">
      <button onclick="adjustHomeWeight(-0.1)">−0.1</button>
      <button onclick="adjustHomeWeight(0.1)">+0.1</button>
      <button onclick="quickSaveHome()">快速记录</button>
    </div>
  </div>
  
  <div class="card">
    <div class="card-title">📊 今日概览</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="statWater">0</div>
        <div class="stat-label">饮水(杯)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statSteps">--</div>
        <div class="stat-label">步数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">记录天数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statAvg">--</div>
        <div class="stat-label">平均体重</div>
      </div>
    </div>
  </div>
</div>

<!-- Tab 2: Trend -->
<div class="tab-content" id="tab-trend">
  <div class="card">
    <div class="card-title">📈 30天体重趋势</div>
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
  </div>
  
  <div class="card">
    <div class="card-title">📊 数据统计</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="trendTotal">0</div>
        <div class="stat-label">记录天数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="trendMin">--</div>
        <div class="stat-label">最低体重</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="trendMax">--</div>
        <div class="stat-label">最高体重</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="trendChange">--</div>
        <div class="stat-label">总变化</div>
      </div>
    </div>
  </div>
</div>

<!-- Tab 3: Track -->
<div class="tab-content" id="tab-track">
  <div class="track-card">
    <div class="track-icon">💧</div>
    <div class="track-info">
      <div class="track-title">饮水记录</div>
      <div><span class="track-value" id="trackWater">0</span><span class="track-unit">杯</span></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="track-btn" onclick="addWater(-1)" style="background:#f1f5f9;color:var(--text)">−</button>
      <button class="track-btn" onclick="addWater(1)">+</button>
    </div>
  </div>
  
  <div class="track-card" style="flex-direction:column;align-items:stretch;gap:16px">
    <div style="display:flex;align-items:center;gap:16px">
      <div class="track-icon">👟</div>
      <div class="track-info">
        <div class="track-title">步数记录</div>
        <div id="trackStepsDisplay" style="font-size:14px;color:var(--text-secondary);margin-top:4px">今日未记录</div>
      </div>
    </div>
    <div class="track-input">
      <input type="number" id="trackStepsInput" placeholder="输入今日步数">
      <button onclick="saveTrackSteps()">保存</button>
    </div>
  </div>
  
  <div class="tips-card">
    <div class="tips-title">💡 健康目标</div>
    <div class="tips-text">• 每日饮水：8杯（约2000ml）<br>• 每日步数：8000-10000步<br>• 健康减重：每周0.5-1kg</div>
  </div>
</div>

<!-- Tab 4: History -->
<div class="tab-content" id="tab-history">
  <div class="history-list" id="historyList"></div>
</div>

<!-- Tab 5: Settings -->
<div class="tab-content" id="tab-settings">
  <div class="tips-card">
    <div class="tips-title">💪 减肥小贴士</div>
    <div class="tips-text">每天记录体重，关注长期趋势而非单日波动。保持饥饿感不是饿肚子，而是选择更健康的食物。坚持就是胜利！</div>
  </div>
  
  <div class="setting-item" onclick="exportData()">
    <div class="setting-left">
      <div class="setting-icon">📤</div>
      <div class="setting-title">导出数据</div>
    </div>
    <div class="setting-arrow">›</div>
  </div>
  
  <div class="setting-item" onclick="document.getElementById('importFile').click()">
    <div class="setting-left">
      <div class="setting-icon">📥</div>
      <div class="setting-title">导入数据</div>
    </div>
    <div class="setting-arrow">›</div>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this.files[0])">
  
  <div class="quote">保持饥饿，做更好更健康的自己</div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('home')">
    <span class="icon">🏠</span>
    <span class="label">首页</span>
  </button>
  <button class="nav-item" onclick="switchTab('trend')">
    <span class="icon">📈</span>
    <span class="label">趋势</span>
  </button>
  <button class="nav-item" onclick="switchTab('track')">
    <span class="icon">➕</span>
    <span class="label">记录</span>
  </button>
  <button class="nav-item" onclick="switchTab('history')">
    <span class="icon">📋</span>
    <span class="label">历史</span>
  </button>
  <button class="nav-item" onclick="switchTab('settings')">
    <span class="icon">⚙️</span>
    <span class="label">我的</span>
  </button>
</div>

<script>
let data = JSON.parse(localStorage.getItem('fittrack_data') || '{"weights":{},"waters":{},"steps":{}}');
let selectedDate = new Date().toISOString().slice(0,10);
let currentTab = 'home';

function init() {
  document.getElementById('selectedDate').value = selectedDate;
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
  
  if (tab === 'trend') drawChart();
  if (tab === 'history') renderHistory();
}

function prevDay() {
  let d = new Date(selectedDate + 'T12:00:00');
  d.setDate(d.getDate() - 1);
  selectedDate = d.toISOString().slice(0,10);
  document.getElementById('selectedDate').value = selectedDate;
  render();
}

function nextDay() {
  let d = new Date(selectedDate + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  let today = new Date().toISOString().slice(0,10);
  if (selectedDate <= today) {
    selectedDate = d.toISOString().slice(0,10);
    document.getElementById('selectedDate').value = selectedDate;
    render();
  }
}

function changeDate(val) {
  selectedDate = val;
  render();
}

function render() {
  let w = data.weights[selectedDate] || null;
  let weightDisplay = document.getElementById('homeWeight');
  let changeDisplay = document.getElementById('homeChange');
  
  if (w) {
    weightDisplay.textContent = w.weight.toFixed(1);
    let prev = getPrevWeight();
    if (prev !== null) {
      let diff = w.weight - prev;
      let arrow = diff < 0 ? '↓' : diff > 0 ? '↑' : '→';
      let color = diff < 0 ? '#a7f3d0' : diff > 0 ? '#fecaca' : '#fff';
      changeDisplay.innerHTML = `<span class="arrow">${arrow}</span>较昨日 ${diff > 0 ? '+' : ''}${diff.toFixed(1)} kg`;
      changeDisplay.style.color = color;
    } else {
      changeDisplay.innerHTML = '首次记录 🎉';
      changeDisplay.style.color = '#fff';
    }
  } else {
    weightDisplay.textContent = '--';
    changeDisplay.innerHTML = '今日未记录';
    changeDisplay.style.color = 'rgba(255,255,255,0.8)';
  }
  
  let cups = data.waters[selectedDate] || 0;
  document.getElementById('statWater').textContent = cups;
  document.getElementById('trackWater').textContent = cups;
  
  let steps = data.steps[selectedDate];
  document.getElementById('statSteps').textContent = steps ? (steps/1000).toFixed(1) + 'k' : '--';
  document.getElementById('trackStepsDisplay').textContent = steps ? `今日已记录 ${steps.toLocaleString()} 步` : '今日未记录步数';
  
  updateStats();
  if (currentTab === 'history') renderHistory();
}

function getPrevWeight() {
  let dates = Object.keys(data.weights).sort();
  let idx = dates.indexOf(selectedDate);
  if (idx > 0) {
    return data.weights[dates[idx-1]].weight;
  }
  return null;
}

function updateStats() {
  let dates = Object.keys(data.weights).sort();
  let total = dates.length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('trendTotal').textContent = total;
  
  if (dates.length > 0) {
    let weights = dates.map(d => data.weights[d].weight);
    let avg = weights.reduce((a,b) => a+b, 0) / weights.length;
    let min = Math.min(...weights);
    let max = Math.max(...weights);
    document.getElementById('statAvg').textContent = avg.toFixed(1);
    document.getElementById('trendMin').textContent = min.toFixed(1);
    document.getElementById('trendMax').textContent = max.toFixed(1);
    
    if (dates.length > 1) {
      let change = weights[weights.length-1] - weights[0];
      let sign = change > 0 ? '+' : '';
      document.getElementById('trendChange').textContent = sign + change.toFixed(1);
      document.getElementById('trendChange').style.color = change < 0 ? 'var(--primary)' : change > 0 ? '#dc2626' : 'var(--text-secondary)';
    } else {
      document.getElementById('trendChange').textContent = '--';
    }
  } else {
    document.getElementById('statAvg').textContent = '--';
    document.getElementById('trendMin').textContent = '--';
    document.getElementById('trendMax').textContent = '--';
    document.getElementById('trendChange').textContent = '--';
  }
}

function renderHistory() {
  let list = document.getElementById('historyList');
  let entries = Object.keys(data.weights).sort().reverse();
  
  if (entries.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary)">暂无记录</div>';
    return;
  }
  
  let html = '';
  for (let i = 0; i < entries.length; i++) {
    let date = entries[i];
    let w = data.weights[date].weight;
    let prev = i < entries.length - 1 ? data.weights[entries[i+1]].weight : null;
    let diff = prev !== null ? (w - prev).toFixed(1) : '';
    let diffClass = prev !== null ? (w < prev ? 'down' : w > prev ? 'up' : '') : '';
    
    let d = new Date(date + 'T12:00:00');
    let weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
    let isToday = date === new Date().toISOString().slice(0,10);
    
    html += '<div class="history-item">';
    html += '<div class="history-date"><span class="day">' + (isToday ? '今天' : (d.getMonth()+1) + '/' + d.getDate()) + '</span><span class="weekday">' + weekdays[d.getDay()] + '</span></div>';
    html += '<div class="history-right"><div class="history-weight">' + w.toFixed(1) + ' kg</div>';
    if (diff) html += '<div class="history-diff ' + diffClass + '">' + (parseFloat(diff) > 0 ? '+' : '') + diff + ' kg</div>';
    html += '</div></div>';
  }
  list.innerHTML = html;
}

function saveHomeWeight() {
  let val = parseFloat(document.getElementById('homeWeightInput').value);
  if (!val || val < 30 || val > 200) {
    alert('请输入有效体重 (30-200kg)');
    return;
  }
  data.weights[selectedDate] = { weight: val };
  save();
  render();
  document.getElementById('homeWeightInput').value = '';
}

function adjustHomeWeight(delta) {
  let input = document.getElementById('homeWeightInput');
  let current = parseFloat(input.value) || 70;
  input.value = (current + delta).toFixed(1);
}

function quickSaveHome() {
  let val = document.getElementById('homeWeightInput').value;
  if (!val) {
    let entries = Object.keys(data.weights).sort().reverse();
    if (entries.length > 0 && entries[0] !== selectedDate) {
      val = data.weights[entries[0]].weight;
    } else {
      alert('请先输入体重');
      return;
    }
  }
  data.weights[selectedDate] = { weight: parseFloat(val) };
  save();
  render();
  document.getElementById('homeWeightInput').value = '';
}

function addWater(delta) {
  let cups = data.waters[selectedDate] || 0;
  cups = Math.max(0, cups + delta);
  data.waters[selectedDate] = cups;
  save();
  render();
}

function saveTrackSteps() {
  let val = parseInt(document.getElementById('trackStepsInput').value);
  if (!val || val < 0) {
    alert('请输入有效步数');
    return;
  }
  data.steps[selectedDate] = val;
  save();
  render();
  document.getElementById('trackStepsInput').value = '';
}

function drawChart() {
  let canvas = document.getElementById('trendChart');
  let ctx = canvas.getContext('2d');
  let rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 240;
  let width = canvas.width;
  let height = canvas.height;
  
  let dates = [];
  let weights = [];
  let today = new Date();
  for (let i = 29; i >= 0; i--) {
    let d = new Date(today);
    d.setDate(d.getDate() - i);
    let dateStr = d.toISOString().slice(0,10);
    dates.push(dateStr);
    weights.push(data.weights[dateStr] ? data.weights[dateStr].weight : null);
  }
  
  let validPoints = weights.filter(w => w !== null);
  if (validPoints.length < 2) {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('记录至少2天体重后显示趋势图', width/2, height/2);
    return;
  }
  
  let minW = Math.min(...validPoints) - 0.5;
  let maxW = Math.max(...validPoints) + 0.5;
  let padding = 40;
  let chartW = width - padding * 2;
  let chartH = height - padding * 2;
  
  ctx.clearRect(0, 0, width, height);
  
  ctx.strokeStyle = '#f1f5f9';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    let y = padding + (chartH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(width - padding, y);
    ctx.stroke();
    
    let weight = maxW - (maxW - minW) * (i / 4);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(weight.toFixed(1), padding - 8, y + 4);
  }
  
  let gradient = ctx.createLinearGradient(0, padding, 0, height - padding);
  gradient.addColorStop(0, 'rgba(16,185,129,0.3)');
  gradient.addColorStop(1, 'rgba(16,185,129,0)');
  
  ctx.beginPath();
  let firstPoint = true;
  let points = [];
  for (let i = 0; i < 30; i++) {
    if (weights[i] !== null) {
      let x = padding + (chartW / 29) * i;
      let y = padding + chartH - ((weights[i] - minW) / (maxW - minW)) * chartH;
      points.push({x, y});
      if (firstPoint) {
        ctx.moveTo(x, y);
        firstPoint = false;
      } else {
        ctx.lineTo(x, y);
      }
    }
  }
  
  if (points.length > 0) {
    ctx.lineTo(points[points.length-1].x, height - padding);
    ctx.lineTo(points[0].x, height - padding);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
  }
  
  ctx.beginPath();
  firstPoint = true;
  for (let i = 0; i < 30; i++) {
    if (weights[i] !== null) {
      let x = padding + (chartW / 29) * i;
      let y = padding + chartH - ((weights[i] - minW) / (maxW - minW)) * chartH;
      if (firstPoint) {
        ctx.moveTo(x, y);
        firstPoint = false;
      } else {
        ctx.lineTo(x, y);
      }
    }
  }
  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 3;
  ctx.stroke();
  
  for (let i = 0; i < 30; i++) {
    if (weights[i] !== null) {
      let x = padding + (chartW / 29) * i;
      let y = padding + chartH - ((weights[i] - minW) / (maxW - minW)) * chartH;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#10b981';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

function save() {
  localStorage.setItem('fittrack_data', JSON.stringify(data));
}

function exportData() {
  let blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = 'fittrack_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  if (!file) return;
  let reader = new FileReader();
  reader.onload = function(e) {
    try {
      let imported = JSON.parse(e.target.result);
      if (imported.weights && imported.waters && imported.steps) {
        data = imported;
        save();
        render();
        alert('数据导入成功！');
      } else {
        alert('文件格式不正确');
      }
    } catch(err) {
      alert('导入失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

init();
window.addEventListener('resize', () => { if (currentTab === 'trend') drawChart(); });
</script>
