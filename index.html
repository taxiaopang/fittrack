<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>罗鸣道减肥记录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#2ecc71;--dark-green:#27ae60;--light-green:#e8f8f0;--text:#2c3e50;--gray:#95a5a6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;color:var(--text);min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,var(--green),var(--dark-green));color:#fff;padding:20px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;margin-bottom:8px}
.date-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:12px}
.date-nav button{background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:18px;padding:8px 14px;border-radius:8px;cursor:pointer}
.date-nav button:hover{background:rgba(255,255,255,0.3)}
.date-picker{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:8px;border-radius:8px;font-size:14px}
input[type=date].date-picker{color-scheme:dark}
.card{background:#fff;border-radius:16px;padding:20px;margin:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.card-title{font-size:14px;color:var(--gray);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.big-weight{text-align:center;padding:30px 0}
.big-weight .value{font-size:56px;font-weight:700;color:var(--green)}
.big-weight .unit{font-size:20px;color:var(--gray);margin-left:4px}
.big-weight .change{font-size:14px;margin-top:8px}
.change.up{color:#e74c3c}
.change.down{color:var(--green)}
.change.same{color:var(--gray)}
.input-group{display:flex;gap:10px;margin-top:16px}
.input-group input{flex:1;padding:14px;font-size:18px;border:2px solid #e8e8e8;border-radius:12px;outline:none}
.input-group input:focus{border-color:var(--green)}
.input-group button{background:var(--green);color:#fff;border:none;padding:14px 24px;font-size:16px;border-radius:12px;cursor:pointer;font-weight:600}
.input-group button:active{transform:scale(0.98)}
.btn-group{display:flex;gap:8px;margin-top:12px}
.btn-group button{background:#f0f0f0;color:var(--text);border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:14px}
.btn-group button.primary{background:var(--green);color:#fff}
.history-list{margin-top:16px}
.history-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.history-item .date{color:var(--gray);font-size:14px}
.history-item .weight{font-weight:600;color:var(--green)}
.history-item .diff{font-size:13px}
.chart-container{background:#fff;border-radius:16px;padding:20px;margin:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.chart-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
canvas{max-width:100%}
.tips{background:var(--light-green);border-radius:12px;padding:16px;margin:16px;font-size:14px;color:var(--dark-green);line-height:1.6}
.tips strong{color:var(--dark-green)}
.quote{text-align:center;padding:20px;color:var(--gray);font-size:14px;font-style:italic}
.quote::before{content:'🌟 '}
</style>
</head>
<body>

<div class="header">
  <h1>⚖️ 罗鸣道减肥记录</h1>
  <div class="date-nav">
    <button onclick="prevDay()">◀</button>
    <input type="date" class="date-picker" id="selectedDate" onchange="changeDate(this.value)">
    <button onclick="nextDay()">▶</button>
  </div>
</div>

<div class="card">
  <div class="card-title">📊 今日体重</div>
  <div class="big-weight">
    <span class="value" id="weightValue">--</span><span class="unit">kg</span>
    <div class="change" id="weightChange"></div>
  </div>
  <div class="input-group">
    <input type="number" id="weightInput" step="0.1" min="30" max="200" placeholder="输入体重(kg)">
    <button onclick="saveWeight()">保存</button>
  </div>
  <div class="btn-group">
    <button onclick="adjustWeight(-0.1)">-0.1</button>
    <button onclick="adjustWeight(0.1)">+0.1</button>
    <button class="primary" onclick="quickSave()">快速记录</button>
  </div>
</div>

<div class="card">
  <div class="card-title">📈 30天趋势</div>
  <canvas id="trendChart" height="200"></canvas>
</div>

<div class="card">
  <div class="card-title">📋 历史记录</div>
  <div class="history-list" id="historyList"></div>
</div>

<div class="card">
  <div class="card-title">💧 饮水量 (杯)</div>
  <div style="display:flex;align-items:center;gap:16px;padding:16px 0">
    <button onclick="addWater(-1)" style="background:#f0f0f0;border:none;font-size:24px;width:48px;height:48px;border-radius:50%;cursor:pointer">-</button>
    <span id="waterCount" style="font-size:48px;font-weight:700;color:var(--green);min-width:80px;text-align:center">0</span>
    <button onclick="addWater(1)" style="background:var(--green);border:none;font-size:24px;width:48px;height:48px;border-radius:50%;cursor:pointer;color:#fff">+</button>
  </div>
  <div style="text-align:center;color:var(--gray);font-size:14px">目标: 8杯/天</div>
</div>

<div class="card">
  <div class="card-title">👟 步数 (步)</div>
  <div style="display:flex;gap:12px">
    <input type="number" id="stepsInput" placeholder="输入步数" style="flex:1;padding:12px;font-size:16px;border:2px solid #e8e8e8;border-radius:10px;outline:none">
    <button onclick="saveSteps()" style="background:var(--green);color:#fff;border:none;padding:12px 20px;border-radius:10px;cursor:pointer">保存</button>
  </div>
  <div id="stepsDisplay" style="margin-top:12px;font-size:14px;color:var(--gray)"></div>
</div>

<div class="tips">
  <strong>💪 减肥小贴士：</strong><br>
  每天记录体重，关注长期趋势而非单日波动。<br>
  保持饥饿感不是饿肚子，而是选择更健康的食物。
</div>

<div class="card">
  <div class="card-title">💾 数据管理</div>
  <div class="btn-group">
    <button onclick="exportData()">📤 导出数据</button>
    <button onclick="document.getElementById('importFile').click()">📥 导入数据</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this.files[0])">
  </div>
</div>

<div class="quote">保持饥饿，做更好更健康的自己</div>

<script>
// 数据管理
let data = JSON.parse(localStorage.getItem('fittrack_data') || '{"weights":{},"waters":{},"steps":{}}');
let selectedDate = new Date().toISOString().slice(0,10);

// 初始化
function init() {
  document.getElementById('selectedDate').value = selectedDate;
  render();
  drawChart();
}

// 日期导航
function prevDay() {
  let d = new Date(selectedDate + 'T12:00:00');
  d.setDate(d.getDate() - 1);
  selectedDate = d.toISOString().slice(0,10);
  document.getElementById('selectedDate').value = selectedDate;
  render();
}

function nextDay() {
  let d = new Date(selectedDate + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  let today = new Date().toISOString().slice(0,10);
  if (selectedDate < today) {
    selectedDate = d.toISOString().slice(0,10);
    document.getElementById('selectedDate').value = selectedDate;
    render();
  }
}

function changeDate(val) {
  selectedDate = val;
  render();
}

// 渲染
function render() {
  let w = data.weights[selectedDate] || null;
  let weightDisplay = document.getElementById('weightValue');
  let changeDisplay = document.getElementById('weightChange');
  
  if (w) {
    weightDisplay.textContent = w.weight;
    let prev = getPrevWeight();
    if (prev !== null) {
      let diff = w.weight - prev;
      let sign = diff > 0 ? '+' : '';
      changeDisplay.className = 'change ' + (diff < 0 ? 'down' : diff > 0 ? 'up' : 'same');
      changeDisplay.textContent = '较上一天 ' + sign + diff.toFixed(1) + ' kg';
    } else {
      changeDisplay.textContent = '';
    }
  } else {
    weightDisplay.textContent = '--';
    changeDisplay.textContent = '今日未记录';
    changeDisplay.className = 'change same';
  }
  
  let cups = data.waters[selectedDate] || 0;
  document.getElementById('waterCount').textContent = cups;
  
  let steps = data.steps[selectedDate];
  document.getElementById('stepsDisplay').textContent = steps ? '今日已记录 ' + steps.toLocaleString() + ' 步' : '今日未记录';
  
  renderHistory();
}

function getPrevWeight() {
  let d = new Date(selectedDate + 'T12:00:00');
  d.setDate(d.getDate() - 1);
  let prevDate = d.toISOString().slice(0,10);
  return data.weights[prevDate] ? data.weights[prevDate].weight : null;
}

function renderHistory() {
  let list = document.getElementById('historyList');
  let entries = Object.keys(data.weights).sort().reverse().slice(0, 20);
  
  if (entries.length === 0) {
    list.innerHTML = '<div style="color:var(--gray);text-align:center;padding:20px">暂无记录</div>';
    return;
  }
  
  let html = '';
  for (let i = 0; i < entries.length; i++) {
    let date = entries[i];
    let w = data.weights[date].weight;
    let prev = i < entries.length - 1 ? data.weights[entries[i+1]].weight : null;
    let diff = prev !== null ? (w - prev).toFixed(1) : '';
    let diffClass = prev !== null ? (w < prev ? 'down' : w > prev ? 'up' : 'same') : '';
    
    html += '<div class="history-item">';
    html += '<span class="date">' + formatDate(date) + '</span>';
    html += '<span class="weight">' + w + ' kg</span>';
    if (diff) html += '<span class="diff ' + diffClass + '">' + (parseFloat(diff) > 0 ? '+' : '') + diff + '</span>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function formatDate(d) {
  let date = new Date(d + 'T12:00:00');
  let today = new Date();
  let yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  
  if (d === today.toISOString().slice(0,10)) return '今天';
  if (d === yesterday.toISOString().slice(0,10)) return '昨天';
  return (date.getMonth()+1) + '月' + date.getDate() + '日';
}

function saveWeight() {
  let val = parseFloat(document.getElementById('weightInput').value);
  if (!val || val < 30 || val > 200) {
    alert('请输入有效体重 (30-200kg)');
    return;
  }
  data.weights[selectedDate] = { weight: val };
  save();
  render();
  drawChart();
  document.getElementById('weightInput').value = '';
}

function adjustWeight(delta) {
  let current = parseFloat(document.getElementById('weightInput').value) || 70;
  let newVal = (current + delta).toFixed(1);
  document.getElementById('weightInput').value = newVal;
}

function quickSave() {
  let val = document.getElementById('weightInput').value;
  if (!val) {
    let entries = Object.keys(data.weights).sort().reverse();
    if (entries.length > 0) {
      val = data.weights[entries[0]].weight;
    } else {
      alert('请先输入体重');
      return;
    }
  }
  data.weights[selectedDate] = { weight: parseFloat(val) };
  save();
  render();
  drawChart();
}

function addWater(delta) {
  let cups = data.waters[selectedDate] || 0;
  cups = Math.max(0, cups + delta);
  data.waters[selectedDate] = cups;
  save();
  document.getElementById('waterCount').textContent = cups;
}

function saveSteps() {
  let val = parseInt(document.getElementById('stepsInput').value);
  if (!val || val < 0) {
    alert('请输入有效步数');
    return;
  }
  data.steps[selectedDate] = val;
  save();
  document.getElementById('stepsDisplay').textContent = '今日已记录 ' + val.toLocaleString() + ' 步';
  document.getElementById('stepsInput').value = '';
}

function drawChart() {
  let canvas = document.getElementById('trendChart');
  let ctx = canvas.getContext('2d');
  let width = canvas.width = canvas.parentElement.clientWidth - 40;
  
  let dates = [];
  let weights = [];
  let today = new Date();
  for (let i = 29; i >= 0; i--) {
    let d = new Date(today);
    d.setDate(d.getDate() - i);
    let dateStr = d.toISOString().slice(0,10);
    dates.push(dateStr);
    weights.push(data.weights[dateStr] ? data.weights[dateStr].weight : null);
  }
  
  let validPoints = weights.filter(w => w !== null);
  if (validPoints.length < 2) {
    ctx.fillStyle = '#95a5a6';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('记录至少2天体重后显示趋势图', width/2, 100);
    return;
  }
  
  let minW = Math.min(...validPoints) - 1;
  let maxW = Math.max(...validPoints) + 1;
  let padding = 40;
  let chartW = width - padding * 2;
  let chartH = 160;
  
  ctx.clearRect(0, 0, width, 200);
  
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    let y = padding + (chartH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(width - padding, y);
    ctx.stroke();
    
    let weight = maxW - (maxW - minW) * (i / 4);
    ctx.fillStyle = '#95a5a6';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(weight.toFixed(1), padding - 8, y + 4);
  }
  
  ctx.strokeStyle = '#2ecc71';
  ctx.lineWidth = 2;
  ctx.beginPath();
  
  let firstPoint = true;
  for (let i = 0; i < 30; i++) {
    if (weights[i] !== null) {
      let x = padding + (chartW / 29) * i;
      let y = padding + chartH - ((weights[i] - minW) / (maxW - minW)) * chartH;
      if (firstPoint) {
        ctx.moveTo(x, y);
        firstPoint = false;
      } else {
        ctx.lineTo(x, y);
      }
    }
  }
  ctx.stroke();
  
  for (let i = 0; i < 30; i++) {
    if (weights[i] !== null) {
      let x = padding + (chartW / 29) * i;
      let y = padding + chartH - ((weights[i] - minW) / (maxW - minW)) * chartH;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#2ecc71';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
  
  let todayX = padding + chartW;
  ctx.fillStyle = '#2ecc71';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('今', todayX, padding + chartH + 20);
}

function save() {
  localStorage.setItem('fittrack_data', JSON.stringify(data));
}

function exportData() {
  let blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = 'fittrack_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  if (!file) return;
  let reader = new FileReader();
  reader.onload = function(e) {
    try {
      let imported = JSON.parse(e.target.result);
      if (imported.weights && imported.waters && imported.steps) {
        data = imported;
        save();
        render();
        drawChart();
        alert('数据导入成功！');
      } else {
        alert('文件格式不正确');
      }
    } catch(err) {
      alert('导入失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

init();
window.addEventListener('resize', drawChart);
</script>

</body>
</html>
